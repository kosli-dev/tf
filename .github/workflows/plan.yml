name: Terraform Plan

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
      aws_role_arn:
        required: true
        type: string
      aws_role_duration:
        default: "1200"
        type: string
      working_directory:
        default: "./"
        type: string
      tf_version:
        default: "1.14.6"
        type: string
      environment:
        required: true
        type: string
      kosli_template_file:
        description: "Path (in caller repo) to the Kosli trail template. Empty disables all Kosli steps."
        default: ""
        type: string
      kosli_host:
        default: "https://app.kosli.com"
        type: string
      kosli_org:
        default: "kosli"
        type: string
      kosli_cli_version:
        default: "2.17.4"
        type: string
    secrets:
      kosli_api_token:
        description: "Kosli API token. Required when kosli_template_file is set."
        required: false

jobs:
  plan:
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/base.yml
    with:
      aws_region: ${{ inputs.aws_region }}
      aws_role_arn: ${{ inputs.aws_role_arn }}
      aws_role_duration: ${{ inputs.aws_role_duration }}
      working_directory: ${{ inputs.working_directory }}
      tf_version: ${{ inputs.tf_version }}
      environment: ${{ inputs.environment }}
      tf_apply: false
      kosli_template_file: ${{ inputs.kosli_template_file }}
      kosli_host: ${{ inputs.kosli_host }}
      kosli_org: ${{ inputs.kosli_org }}
      kosli_flow: terraform-plan-${{ inputs.environment }}-${{ github.event.repository.name }}
      kosli_cli_version: ${{ inputs.kosli_cli_version }}
    secrets:
      kosli_api_token: ${{ secrets.kosli_api_token }}
