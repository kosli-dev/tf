name: Terraform

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
      aws_role_arn:
        required: true
        type: string
      aws_role_duration:
        default: "1200"
        type: string
      working_directory:
        default: "./"
        type: string
      tf_version:
        default: "1.14.6"
        type: string
      tf_apply:
        default: "false"
        type: string
      environment:
        required: true
        type: string

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
      environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ inputs.tf_version }}
          terraform_wrapper: false

      - name: Install tf
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: kosli-dev/tf
          path: .tf-cli
      - run: echo "$GITHUB_WORKSPACE/.tf-cli/bin" >> $GITHUB_PATH

      - name: Check formatting
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt --recursive -check

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
          role-duration-seconds: ${{ inputs.aws_role_duration }}
          role-session-name: ${{ github.event.repository.name }}

      - name: Plan
        working-directory: ${{ inputs.working_directory }}
        run: tf plan -no-color

      - name: Show plan
        working-directory: ${{ inputs.working_directory }}
        run: tf show -no-color /tmp/${{ inputs.environment }}.tfplan > /tmp/${{ inputs.environment }}.plan.txt

      - name: Plan summary
        run: |
          line=$(grep -E 'No changes\.|Plan: ' /tmp/${{ inputs.environment }}.plan.txt)
          echo "### ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "$line" >> $GITHUB_STEP_SUMMARY

      - name: Upload plan
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tfplan-${{ inputs.environment }}
          path: /tmp/${{ inputs.environment }}.plan.txt
          archive: false

      - name: Apply
        if: inputs.tf_apply == 'true'
        working-directory: ${{ inputs.working_directory }}
        run: tf apply 2>&1 | tee /tmp/${{ inputs.environment }}.apply.txt

      - name: Apply summary
        if: inputs.tf_apply == 'true'
        run: |
          line=$(grep -E 'Apply complete!' /tmp/${{ inputs.environment }}.apply.txt)
          echo "### ${{ inputs.environment }} (apply)" >> $GITHUB_STEP_SUMMARY
          echo "$line" >> $GITHUB_STEP_SUMMARY

      - name: Upload apply log
        if: inputs.tf_apply == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tfapply-${{ inputs.environment }}
          path: /tmp/${{ inputs.environment }}.apply.txt
          archive: false
