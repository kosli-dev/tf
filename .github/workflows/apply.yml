name: Terraform Apply

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
      aws_role_arn:
        required: true
        type: string
      aws_role_duration:
        default: "1200"
        type: string
      working_directory:
        default: "./"
        type: string
      tf_version:
        default: "1.14.6"
        type: string
      environment:
        required: true
        type: string
      tf_state_file_name:
        description: "Name of the state file in S3 under terraform/<repo>/."
        default: "main.tfstate"
        type: string
      kosli_template_file:
        description: "Path (in caller repo) to the Kosli trail template. Empty disables all Kosli steps."
        default: ""
        type: string
      kosli_host:
        default: "https://app.kosli.com"
        type: string
      kosli_org:
        default: "kosli"
        type: string
      kosli_cli_version:
        default: "2.17.4"
        type: string
    secrets:
      kosli_api_token:
        description: "Kosli API token. Required when kosli_template_file is set."
        required: false

jobs:
  apply:
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/base.yml
    with:
      aws_region: ${{ inputs.aws_region }}
      aws_role_arn: ${{ inputs.aws_role_arn }}
      aws_role_duration: ${{ inputs.aws_role_duration }}
      working_directory: ${{ inputs.working_directory }}
      tf_version: ${{ inputs.tf_version }}
      environment: ${{ inputs.environment }}
      tf_apply: true
      kosli_template_file: ${{ inputs.kosli_template_file }}
      kosli_host: ${{ inputs.kosli_host }}
      kosli_org: ${{ inputs.kosli_org }}
      kosli_flow: terraform-apply-${{ inputs.environment }}
      kosli_cli_version: ${{ inputs.kosli_cli_version }}
    secrets:
      kosli_api_token: ${{ secrets.kosli_api_token }}

  reset-drift-detection:
    needs: apply
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      KOSLI_ORG: ${{ inputs.kosli_org }}
      KOSLI_HOST: ${{ inputs.kosli_host }}
      KOSLI_API_TOKEN: ${{ secrets.kosli_api_token }}
      KOSLI_FLOW: terraform-apply-${{ inputs.environment }}
      KOSLI_TRAIL: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
          role-duration-seconds: ${{ inputs.aws_role_duration }}
          role-session-name: ${{ github.event.repository.name }}

      - name: Compute state bucket name
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          HASH=$(printf '%s-%s' "$ACCOUNT_ID" "${{ inputs.aws_region }}" | sha1sum | cut -d' ' -f1)
          echo "S3_BUCKET=terraform-state-${HASH}" >> "$GITHUB_ENV"

      - name: Create drift plan
        run: |
          jq -n --arg sha "${{ github.event.pull_request.head.sha || github.sha }}" '{sha: $sha, drift: false}' > /tmp/drift.plan.json

      - name: Upload drift plan to S3
        run: |
          aws s3 cp /tmp/drift.plan.json "s3://${S3_BUCKET}/terraform/${{ github.event.repository.name }}/drift.plan.json"

      - name: Upload drift plan artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: drift-${{ inputs.environment }}
          path: /tmp/drift.plan.json
          archive: false

      - name: Setup Kosli CLI
        if: inputs.kosli_template_file != ''
        uses: kosli-dev/setup-cli-action@d4e28a69867117f50417f53eda3ee23867150899 # v3
        with:
          version: ${{ inputs.kosli_cli_version }}

      - name: Download state file from S3
        if: inputs.kosli_template_file != ''
        run: |
          aws s3 cp \
            "s3://${S3_BUCKET}/terraform/${{ github.event.repository.name }}/${{ inputs.tf_state_file_name }}" \
            "/tmp/${{ inputs.tf_state_file_name }}"

      - name: Kosli attest state file
        if: inputs.kosli_template_file != ''
        run: kosli attest artifact "/tmp/${{ inputs.tf_state_file_name }}" --artifact-type file --name terraform-state

      - name: Kosli attest drift plan
        if: inputs.kosli_template_file != ''
        run: kosli attest artifact /tmp/drift.plan.json --artifact-type file --name drift-plan
